name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          CODEBRIDGE_AUTH_DISABLED: "1"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test Docker build
        run: docker build -t codebridge-test .

      - name: Test service starts
        run: |
          docker run -d --name codebridge-test -p 8001:8000 \
            -e CODEBRIDGE_AUTH_DISABLED=1 \
            codebridge-test
          sleep 5
          curl -sf http://localhost:8001/health | python -m json.tool
          docker stop codebridge-test
          docker rm codebridge-test