name: Update Terminology Data

on:
  schedule:
    # ICD-10-CM: updates Oct 1 annually
    # RxNorm: updates monthly
    # Run monthly on the 2nd at 09:00 UTC
    - cron: '0 9 2 * *'
  workflow_dispatch:  # Manual trigger

jobs:
  update-cms:
    name: Update CMS ICD-10-CM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download and parse CMS ICD-10-CM
        run: |
          pip install requests
          python3 scripts/download_cms_icd10.py --output data/terminology_parsed/icd10cm_full.json

      - name: Verify data
        run: |
          python3 -c "import json; d=json.load(open('data/terminology_parsed/icd10cm_full.json')); print(f'ICD-10-CM: {len(d)} codes')"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Auto-update: CMS ICD-10-CM terminology"
          body: |
            Automated monthly check for CMS ICD-10-CM updates.
            Generated by GitHub Actions cron.
          branch: auto-update/icd10cm
          commit-message: "Auto-update CMS ICD-10-CM data"
          labels: auto-update, terminology

  update-rxnorm:
    name: Update NLM RxNorm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download and parse NLM RxNorm
        run: |
          pip install requests
          python3 scripts/download_rxnorm.py --output data/terminology_parsed/rxnorm.json

      - name: Verify data
        run: |
          python3 -c "import json; d=json.load(open('data/terminology_parsed/rxnorm.json')); print(f'RxNorm: {len(d)} codes')"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Auto-update: NLM RxNorm terminology"
          body: |
            Automated monthly check for NLM RxNorm updates.
            Generated by GitHub Actions cron.
          branch: auto-update/rxnorm
          commit-message: "Auto-update NLM RxNorm data"
          labels: auto-update, terminology
