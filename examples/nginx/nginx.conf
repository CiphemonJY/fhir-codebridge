# nginx Reverse Proxy for fhir-codebridge
# Provides TLS termination for production deployments.
# Hospitals should NOT run the API over plain HTTP in production.

# Required:
# 1. SSL certificate (self-signed or from your CA / Let's Encrypt)
# 2. nginx with stream/proxy modules (standard in most distros)
# 3. fhir-codebridge running on localhost:8000

# /etc/nginx/conf.d/fhir-codebridge.conf

upstream fhir_codebridge {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name codebridge.your-hospital.local;

    # TLS — replace with your certificate paths
    ssl_certificate     /etc/nginx/ssl/codebridge.crt;
    ssl_certificate_key /etc/nginx/ssl/codebridge.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request size limit (codes are small, but be safe)
    client_max_body_size 1m;

    # Rate limiting (optional — adjust for your environment)
    limit_req_zone $binary_remote_addr zone=codebridge_api:10m rate=10r/s;

    # API endpoints
    location / {
        limit_req zone=codebridge_api burst=20 nodelay;
        proxy_pass http://fhir_codebridge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check (no rate limit, no auth header needed)
    location = /health {
        proxy_pass http://fhir_codebridge/health;
        access_log off;
    }

    # Swagger UI (restrict to internal networks if needed)
    location /docs {
        # allow 10.0.0.0/8;      # internal network
        # allow 172.16.0.0/12;   # Docker network
        # deny all;
        proxy_pass http://fhir_codebridge/docs;
    }

    # Audit log endpoint (admin only — restrict by IP)
    location /audit {
        # allow 10.0.0.0/8;      # admin network only
        # deny all;
        proxy_pass http://fhir_codebridge/audit;
    }

    # Log format for audit compliance
    access_log /var/log/nginx/codebridge_access.log combined;
    error_log  /var/log/nginx/codebridge_error.log warn;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name codebridge.your-hospital.local;
    return 301 https://$host$request_uri;
}